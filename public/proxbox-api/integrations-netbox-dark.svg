<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-label="proxbox-api integrations architecture">
  <defs>
    <marker id="arrow" viewBox="0 0 8 8" refX="4" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 2 L4 7 L7 2" fill="none" stroke="#768390" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .mono { font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; }
    </style>
  </defs>

  <!-- Canvas -->
  <rect width="1100" height="640" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="1099" height="639" fill="none" stroke="#373e47"/>

  <!-- Title strip -->
  <rect x="0" y="0" width="1100" height="44" fill="#1c2128"/>
  <line x1="0" y1="44" x2="1100" y2="44" stroke="#373e47"/>
  <text class="mono" x="16" y="27" fill="#768390" font-size="12">proxbox-api · integrations architecture</text>
  <text class="mono" x="1084" y="27" fill="#768390" font-size="11" text-anchor="end">netbox-dark</text>

  <!-- ============ TOP ROW: 5 plugin nodes ============ -->
  <!-- netbox-ceph (highlight) -->
  <rect x="40" y="78" width="180" height="40" fill="#161b22" stroke="#539bf5" stroke-opacity="0.7"/>
  <text class="mono" x="130" y="103" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#539bf5">netbox-ceph</tspan><tspan fill="#768390" font-size="11"> plugin</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- netbox-pbs (highlight) -->
  <rect x="240" y="78" width="180" height="40" fill="#161b22" stroke="#539bf5" stroke-opacity="0.7"/>
  <text class="mono" x="330" y="103" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#539bf5">netbox-pbs</tspan><tspan fill="#768390" font-size="11"> plugin</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- netbox-proxbox (featured) -->
  <rect x="440" y="78" width="220" height="40" fill="#539bf5" fill-opacity="0.10" stroke="#539bf5"/>
  <text class="mono" x="550" y="103" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#539bf5" font-weight="bold">netbox-proxbox</tspan><tspan fill="#768390" font-size="11"> base plugin</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- netbox-pdm (highlight) -->
  <rect x="680" y="78" width="180" height="40" fill="#161b22" stroke="#539bf5" stroke-opacity="0.7"/>
  <text class="mono" x="770" y="103" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#539bf5">netbox-pdm</tspan><tspan fill="#768390" font-size="11"> plugin</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- netbox-packer (highlight) -->
  <rect x="880" y="78" width="180" height="40" fill="#161b22" stroke="#539bf5" stroke-opacity="0.7"/>
  <text class="mono" x="970" y="103" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#539bf5">netbox-packer</tspan><tspan fill="#768390" font-size="11"> plugin</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- ============ PLUGIN -> API FUNNEL ============ -->
  <!-- Down legs from each plugin to bus at y=148 -->
  <line x1="130" y1="118" x2="130" y2="148" stroke="#768390" stroke-width="1"/>
  <line x1="330" y1="118" x2="330" y2="148" stroke="#768390" stroke-width="1"/>
  <line x1="550" y1="118" x2="550" y2="148" stroke="#768390" stroke-width="1"/>
  <line x1="770" y1="118" x2="770" y2="148" stroke="#768390" stroke-width="1"/>
  <line x1="970" y1="118" x2="970" y2="148" stroke="#768390" stroke-width="1"/>
  <!-- Horizontal bus -->
  <line x1="130" y1="148" x2="970" y2="148" stroke="#768390" stroke-width="1"/>
  <!-- Drop to api -->
  <line x1="550" y1="148" x2="550" y2="184" stroke="#768390" stroke-width="1"/>

  <!-- Funnel labels -->
  <text class="mono" x="550" y="198" text-anchor="middle" font-size="11" fill="#768390" letter-spacing="1">HTTP REST · SSE · WEBSOCKET</text>
  <text class="mono" x="550" y="214" text-anchor="middle" font-size="10" fill="#768390" fill-opacity="0.75" letter-spacing="0.5">auth: X-Proxbox-API-Key</text>

  <!-- Arrow into proxbox-api -->
  <line x1="550" y1="222" x2="550" y2="242" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ============ MIDDLE: proxbox-api (highlight) ============ -->
  <rect x="430" y="250" width="240" height="44" fill="#161b22" stroke="#539bf5" stroke-opacity="0.7"/>
  <text class="mono" x="550" y="277" text-anchor="middle" font-size="14">
    <tspan fill="#768390">[ </tspan><tspan fill="#539bf5" font-weight="bold">proxbox-api</tspan><tspan fill="#768390" font-size="11"> :8000 · FastAPI</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- ============ FORK CONNECTOR ============ -->
  <line x1="550" y1="294" x2="550" y2="324" stroke="#768390" stroke-width="1"/>
  <line x1="330" y1="324" x2="770" y2="324" stroke="#768390" stroke-width="1"/>
  <line x1="330" y1="324" x2="330" y2="354" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="770" y1="324" x2="770" y2="354" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Fork left labels -->
  <text class="mono" x="330" y="372" text-anchor="middle" font-size="11" fill="#768390" letter-spacing="1">WRITE TARGET</text>
  <text class="mono" x="330" y="386" text-anchor="middle" font-size="10" fill="#768390" fill-opacity="0.75">async · cached GET 60s TTL</text>
  <text class="mono" x="330" y="400" text-anchor="middle" font-size="10" fill="#768390" fill-opacity="0.75">PROXBOX_NETBOX_MAX_CONCURRENT</text>

  <!-- Fork right labels -->
  <text class="mono" x="770" y="372" text-anchor="middle" font-size="11" fill="#768390" letter-spacing="1">READ SOURCE</text>
  <text class="mono" x="770" y="386" text-anchor="middle" font-size="10" fill="#768390" fill-opacity="0.75">async · mock | real · read-only</text>
  <text class="mono" x="770" y="400" text-anchor="middle" font-size="10" fill="#768390" fill-opacity="0.75">PROXBOX_VM_SYNC_MAX_CONCURRENCY</text>

  <!-- ============ BOTTOM-LEFT BRANCH: netbox-sdk -> netbox REST ============ -->
  <rect x="220" y="424" width="220" height="40" fill="#161b22" stroke="#539bf5" stroke-opacity="0.7"/>
  <text class="mono" x="330" y="449" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#539bf5">netbox-sdk</tspan><tspan fill="#768390" font-size="11"> 0.0.8.post1</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <line x1="330" y1="464" x2="330" y2="500" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="mono" x="345" y="486" font-size="10" fill="#768390" letter-spacing="1">REST</text>

  <rect x="220" y="510" width="220" height="40" fill="#161b22" stroke="#373e47"/>
  <text class="mono" x="330" y="535" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#adbac7">netbox · REST API</tspan><tspan fill="#768390" font-size="11"> 4.5.x / 4.6.x</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- ============ BOTTOM-RIGHT BRANCH: proxmox-sdk -> proxmox REST ============ -->
  <rect x="660" y="424" width="220" height="40" fill="#161b22" stroke="#539bf5" stroke-opacity="0.7"/>
  <text class="mono" x="770" y="449" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#539bf5">proxmox-sdk</tspan><tspan fill="#768390" font-size="11"> 0.0.5.post1</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <line x1="770" y1="464" x2="770" y2="500" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="mono" x="785" y="486" font-size="10" fill="#768390" letter-spacing="1">REST</text>

  <rect x="660" y="510" width="220" height="40" fill="#161b22" stroke="#373e47"/>
  <text class="mono" x="770" y="535" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#adbac7">proxmox · REST API</tspan><tspan fill="#768390" font-size="11"> 7.x / 8.x</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- Footer caption -->
  <text class="mono" x="16" y="618" fill="#768390" fill-opacity="0.7" font-size="10">consumer plugins → proxbox-api (FastAPI on :8000) → downstream REST writes (netbox) / reads (proxmox)</text>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Emerson Felipe - Software Developer, Network Automation Engineer, and Open Source Contributor">
    <meta name="author" content="Emerson Felipe">
    <meta property="og:title" content="Emerson Felipe - Network Automation Engineer">
    <meta property="og:description" content="Software Developer passionate about Network Automation and Open Source">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://emersonfelipesp.com">
    <title>Emerson Felipe - Network Automation Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #0d1117;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 100%;
            background-color: #0d1117;
            color: #c9d1d9;
        }
        .markdown-body img {
            background-color: transparent;
            display: inline-block;
            margin: 4px;
        }
        .markdown-body a {
            color: #58a6ff;
            display: inline-block;
        }
        .markdown-body a img {
            vertical-align: middle;
        }
        .markdown-body p {
            display: block;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            border-bottom: 1px solid #21262d;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #c9d1d9;
            font-size: 18px;
        }
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        @media (max-width: 767px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="markdown-body" id="content">
            <div class="loading">Loading profile</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Configure marked with GitHub Flavored Markdown
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false
        });

        fetch('README.md')
            .then(response => {
                if (!response.ok) throw new Error('Failed to load README');
                return response.text();
            })
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                document.getElementById('content').innerHTML = 
                    '<div style="text-align: center; color: #f85149; padding: 50px;">' +
                    '<h2>⚠️ Error loading content</h2>' +
                    '<p>Please try again later or visit my <a href="https://github.com/emersonfelipesp" style="color: #58a6ff;">GitHub profile</a>.</p>' +
                    '</div>';
                console.error('Error:', error);
            });
    </script>
</body>
</html>

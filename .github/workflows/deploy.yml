name: Deploy Profile to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours — polls for netbox-cli docs changes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      netbox_cli_sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - name: Get netbox-cli gh-pages latest commit SHA
        id: get_sha
        run: |
          SHA=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/emersonfelipesp/netbox-cli/commits?sha=gh-pages&per_page=1" \
            | jq -r '.[0].sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Latest netbox-cli gh-pages SHA: $SHA"

      - name: Restore cached SHA (skip deploy if docs unchanged on schedule)
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/netbox-cli-sha-placeholder
          key: netbox-cli-gh-pages-${{ steps.get_sha.outputs.sha }}

      - name: Decide whether to deploy
        id: decide
        run: |
          EVENT="${{ github.event_name }}"
          CACHE_HIT="${{ steps.cache.outputs.cache-hit }}"
          if [ "$EVENT" != "schedule" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "Deploy triggered by $EVENT — proceeding."
          elif [ "$CACHE_HIT" = "true" ]; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "Scheduled run — netbox-cli docs unchanged (SHA cached), skipping deploy."
          else
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "Scheduled run — netbox-cli docs changed or first run, deploying."
          fi

  build:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.should_deploy == 'true'
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Checkout netbox-cli gh-pages docs
        uses: actions/checkout@v4
        with:
          repository: emersonfelipesp/netbox-cli
          ref: gh-pages
          path: netbox-cli

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact (profile root + netbox-cli/ docs)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Save netbox-cli SHA to cache (marks docs as deployed)
        uses: actions/cache/save@v4
        with:
          path: /tmp/netbox-cli-sha-placeholder
          key: netbox-cli-gh-pages-${{ needs.check-changes.outputs.netbox_cli_sha }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [check-changes, build]
    if: needs.check-changes.outputs.should_deploy == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

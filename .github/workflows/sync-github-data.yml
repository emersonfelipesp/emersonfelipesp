name: Sync GitHub data

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours — matches deploy.yml cadence
  workflow_dispatch:
  repository_dispatch:
    types: [refresh-github-data]

permissions:
  contents: write

concurrency:
  group: sync-github-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec tsx scripts/sync-github-data.ts

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/github-data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/github-data
            git commit -m "chore(github-data): refresh release snapshot"
            git push
          else
            echo "No changes — skipping commit."
          fi
